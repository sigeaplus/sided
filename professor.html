  }
}

// ── FUNÇÕES OMR ──

function omrDetectarCantos(ctx, W, H) {
  const imgData = ctx.getImageData(0, 0, W, H);
  const d = imgData.data;

  function lum(x, y) {
    if (x<0||x>=W||y<0||y>=H) return 255;
    const i=(y*W+x)*4;
    return d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
  }
  function isEscuro(x,y) { return lum(x,y) < 80; }
  function isClaro(x,y)  { return lum(x,y) > 160; }

  // Detecta o padrão "olho de QR": região escura > clara > escura no centro
  // Varre linha horizontal pelo centro do candidato
  function scoreOlho(cx, cy, r) {
    // Espera: borda escura (r px), interior claro (~60%), núcleo escuro (~30%)
    let score = 0;
    // Verifica que os 4 cantos externos são escuros
    const borda = [[cx-r,cy],[cx+r,cy],[cx,cy-r],[cx,cy+r]];
    for (const [x,y] of borda) if (isEscuro(x,y)) score += 2;
    // Verifica que os pontos a ~40% do raio são claros (anel branco interno)
    const rb = Math.round(r*0.4);
    const meio = [[cx-rb,cy],[cx+rb,cy],[cx,cy-rb],[cx,cy+rb]];
    for (const [x,y] of meio) if (isClaro(x,y)) score += 2;
    // Verifica que o centro é escuro (núcleo)
    if (isEscuro(cx,cy)) score += 4;
    return score; // máx 16
  }

  // Busca em cada quadrante
  const zW = Math.floor(W*0.22), zH = Math.floor(H*0.22);
  const r = Math.max(6, Math.floor(Math.min(W,H)*0.018)); // raio esperado do marcador

  function encontrarMarcador(x0,y0,x1,y1) {
    let best = null, bestScore = 6; // threshold mínimo
    const step = Math.max(2, Math.floor(Math.min(x1-x0,y1-y0)/35));
    for (let y=y0+r; y<y1-r; y+=step) {
      for (let x=x0+r; x<x1-r; x+=step) {
        if (!isEscuro(x,y)) continue; // centro precisa ser escuro
        const s = scoreOlho(x, y, r);
        if (s > bestScore) { bestScore=s; best={x,y}; }
      }
    }
    return best;
  }

  const tl = encontrarMarcador(0,    0,    zW,   zH);
  const tr = encontrarMarcador(W-zW, 0,    W,    zH);
  const bl = encontrarMarcador(0,    H-zH, zW,   H);
  const br = encontrarMarcador(W-zW, H-zH, W,    H);

  if (!tl||!tr||!bl||!br) {
    const m=Math.floor(Math.min(W,H)*0.04);
    return {tl:{x:m,y:m},tr:{x:W-m,y:m},bl:{x:m,y:H-m},br:{x:W-m,y:H-m}};
  }
  return {tl,tr,bl,br};
}

function omrRetificarPerspectiva(ctx, W, H, corners) {
  const dstW=800, dstH=1100;
  const dstCanvas=document.createElement('canvas');
  dstCanvas.width=dstW; dstCanvas.height=dstH;
  const dstCtx=dstCanvas.getContext('2d');
  const src=ctx.getImageData(0,0,W,H);
  const dst=dstCtx.createImageData(dstW,dstH);
  const sd=src.data, dd=dst.data;
  const {tl,tr,bl,br}=corners;
  for (let dy=0; dy<dstH; dy++) {
    const v=dy/dstH;
    for (let dx=0; dx<dstW; dx++) {
      const u=dx/dstW;
      const sx=(1-v)*((1-u)*tl.x+u*tr.x)+v*((1-u)*bl.x+u*br.x);
      const sy=(1-v)*((1-u)*tl.y+u*tr.y)+v*((1-u)*bl.y+u*br.y);
      const six=Math.round(sx), siy=Math.round(sy);
      if (six>=0&&six<W&&siy>=0&&siy<H) {
        const si=(siy*W+six)*4, di=(dy*dstW+dx)*4;
        dd[di]=sd[si]; dd[di+1]=sd[si+1]; dd[di+2]=sd[si+2]; dd[di+3]=255;
      }
    }
  }
  dstCtx.putImageData(dst,0,0);
  return dstCanvas;
}

function omrAnalisarBolhas(canvas, nQ, nA, modelo) {
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const imgData=ctx.getImageData(0,0,W,H);
  const d=imgData.data;
  function luminancia(x,y) {
    if (x<0||x>=W||y<0||y>=H) return 255;
    const i=(y*W+x)*4;
    return d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
  }
  function mediaBolha(cx,cy,r) {
    let sum=0,cnt=0;
    for (let dy=-r; dy<=r; dy++) for (let dx=-r; dx<=r; dx++) {
      if (dx*dx+dy*dy<=r*r) { sum+=luminancia(cx+dx,cy+dy); cnt++; }
    }
    return cnt>0?sum/cnt:255;
  }

  const letras='ABCDE'.slice(0,nA);
  const respostas=[];

  if (modelo === 'caed') {
    // Layout CAEd: 4 colunas de até 7 questões, bolhas horizontais A B C D
    // Área de bolhas: ~28% topo até ~92% base, margens laterais ~5% e ~95%
    const margemTop=H*0.28, margemBot=H*0.92;
    const margemLeft=W*0.05, margemRight=W*0.95;
    const areaH=margemBot-margemTop, areaW=margemRight-margemLeft;
    const qPorCol=7;
    const nCols=Math.ceil(nQ/qPorCol);
    const colW=areaW/nCols;
    const rowH=areaH/qPorCol;
    // Dentro de cada coluna: col. número (~18% colW) + nA bolhas
    const altW=colW*0.82/nA;
    const bolhaR=Math.min(altW,rowH)*0.3;

    for (let q=0; q<nQ; q++) {
      const col=Math.floor(q/qPorCol), row=q%qPorCol;
      const colX=margemLeft+col*colW;
      // Início das bolhas (após coluna de número ~18%)
      const cx0=colX+colW*0.22+altW*0.5;
      const cy=margemTop+row*rowH+rowH*0.5;
      const scores=[];
      for (let a=0; a<nA; a++) scores.push(mediaBolha(Math.round(cx0+a*altW),Math.round(cy),Math.round(bolhaR)));
      const minLum=Math.min(...scores), maxLum=Math.max(...scores);
      respostas.push(maxLum-minLum>18 ? letras[scores.indexOf(minLum)] : null);
    }
  } else {
    // Layout Simples: 1 coluna, questões em linhas sequenciais
    // Área de bolhas: ~35% topo até ~92% base, margens ~8% e ~92%
    const margemTop=H*0.35, margemBot=H*0.92;
    const margemLeft=W*0.08, margemRight=W*0.92;
    const areaH=margemBot-margemTop, areaW=margemRight-margemLeft;
    const rowH=areaH/nQ;
    // Número (~12% areaW) + nA bolhas
    const altW=areaW*0.88/nA;
    const bolhaR=Math.min(altW,rowH)*0.3;
    const cx0=margemLeft+areaW*0.14+altW*0.5;

    for (let q=0; q<nQ; q++) {
      const cy=margemTop+q*rowH+rowH*0.5;
      const scores=[];
      for (let a=0; a<nA; a++) scores.push(mediaBolha(Math.round(cx0+a*altW),Math.round(cy),Math.round(bolhaR)));
      const minLum=Math.min(...scores), maxLum=Math.max(...scores);
      respostas.push(maxLum-minLum>18 ? letras[scores.indexOf(minLum)] : null);
    }
  }
  return respostas;
}
function selectResposta(btn, questaoId, letra) {
  // Deselect siblings
  const container = btn.parentElement;
  container.querySelectorAll('.ans-btn').forEach(b=>{
    if (b !== btn && b.textContent !== '✕') b.classList.remove('selected');
  });
  btn.classList.add('selected');
  const modal = document.getElementById('modal-resultado');
  if (modal) {
    modal._respostas = modal._respostas || {};
    modal._respostas[questaoId] = letra;
    calcNotaFromRespostas(modal);
  }
}

function clearResposta(questaoId) {
  const modal = document.getElementById('modal-resultado');
  if (modal && modal._respostas) delete modal._respostas[questaoId];
  // Deselect buttons
  const row = [...document.querySelectorAll('#res-questoes .ans-btn')].filter(b=>b.onclick?.toString().includes(questaoId));
  row.forEach(b=>b.classList.remove('selected'));
  calcNotaFromRespostas(modal);
}

function calcNotaFromRespostas(modal) {
  if (!modal?._questoes?.length) return;
  const respostas = modal._respostas || {};
  let acertos = 0;
  for (const q of modal._questoes) {
    if (q.gabarito && respostas[q.id] === q.gabarito) acertos += (q.valor||1);
  }
  const notaEl = document.getElementById('res-nota');
  if (notaEl) notaEl.value = acertos;
}

      <strong>${q.numero}. (${q.valor}pt)</strong> ${q.habilidade_bncc?`<small>[${q.habilidade_bncc}]</small>`:''}<br/>
      <p style="margin:0.4rem 0;">${esc(q.enunciado||'')}</p>
      ${'ABCDE'.slice(0,q.num_alternativas||4).split('').map(l=>{
        const alt = (q.sicep_alternativas||[]).find(a=>a.letra===l);
        return `<div class="alt">${l}) ${alt?esc(alt.texto):'___'}</div>`;
      }).join('')}
    </div>`).join('')}
  </body></html>`);
  win.document.close();
  win.print();
}

async function imprimirCartao(avalId) {
  switchAvalTab('respostas');
  setTimeout(()=>window.print(), 500);
}

// ============================================================
// UTILS
// ============================================================
function closeModal(id) {
  stopOCR();
  const m = document.getElementById(id);
  if (m) m.remove();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// START
// ============================================================
init();
