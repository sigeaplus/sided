<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SICEP — Avaliações</title>
<meta name="description" content="Sistema de avaliações SICEP"/>
<meta name="theme-color" content="#FFE600"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="SICEP"/>
<link rel="icon" href="sicep_logo.png"/>
<link rel="apple-touch-icon" href="sicep_logo.png"/>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- OMR: sem dependência externa -->
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --yellow: #FFE600;
    --yellow-dark: #ccb800;
    --yellow-light: #fff9cc;
    --bg: #f5f4ef;
    --surface: #ffffff;
    --surface2: #f0efe8;
    --border: #dddcd5;
    --text: #1c1b18;
    --text-muted: #7a7870;
    --red: #dc2626;
    --green: #16a34a;
    --orange: #ea580c;
  }
  * { box-sizing: border-box; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; margin: 0; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  /* Toast */
  #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; max-width: 320px;
    animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
  .toast-success { background: #f0fdf4; border: 1px solid var(--green); color: #15803d; }
  .toast-error { background: #fef2f2; border: 1px solid var(--red); color: #b91c1c; }
  .toast-info { background: #fff9cc; border: 1px solid #ccb800; color: #5c5200; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem;
    border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; border: none; font-family: 'Sora', sans-serif; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--yellow); color: #000; }
  .btn-primary:hover:not(:disabled) { background: var(--yellow-dark); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); border-color: #bbb; }
  .btn-danger { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
  .btn-danger:hover:not(:disabled) { background: #fee2e2; }
  .btn-sm { padding: 0.35rem 0.65rem; font-size: 0.78rem; }
  .btn-icon { padding: 0.4rem; }

  /* Inputs */
  .input { width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 0.55rem 0.75rem; font-size: 0.88rem;
    font-family: 'Sora', sans-serif; transition: border-color 0.15s; outline: none; }
  .input:focus { border-color: var(--yellow); }
  .input::placeholder { color: var(--text-muted); }
  textarea.input { resize: vertical; min-height: 80px; }
  select.input { cursor: pointer; }
  label.lbl { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.3rem; letter-spacing: 0.05em; text-transform: uppercase; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .card-hover { transition: border-color 0.15s, transform 0.15s; cursor: pointer; }
  .card-hover:hover { border-color: #444; transform: translateY(-1px); }

  /* Tabs */
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); gap: 0; }
  .tab-btn { padding: 0.6rem 1.1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
    border: none; background: transparent; color: var(--text-muted); border-bottom: 2px solid transparent;
    transition: all 0.15s; font-family: 'Sora', sans-serif; margin-bottom: -1px; }
  .tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* Badge */
  .badge { display: inline-flex; align-items: center; padding: 0.15rem 0.55rem; border-radius: 20px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.03em; }
  .badge-green { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
  .badge-yellow { background: #fff099; color: #5c5200; border: 1px solid #FFE600; }
  .badge-gray { background: var(--surface2); color: #7a7870; border: 1px solid var(--border); }
  .badge-red { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
  .badge-blue { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal-lg { max-width: 820px; }
  .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; }
  .modal-body { padding: 1.5rem; }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 0.5rem; }

  /* Sidebar / Nav */

  /* Progress bar */
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

  /* Toggle */
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 22px; cursor: pointer; transition: 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 16px; height: 16px;
    left: 2px; top: 2px; background: var(--text-muted); border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--yellow); border-color: var(--yellow-dark); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: #000; }

  /* Histogram bars */
  .hist-bar { display: flex; align-items: flex-end; gap: 2px; height: 80px; }
  .hist-col { flex: 1; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; cursor: default; }


  /* Mobile overlay painel aluno */
  #painel-mobile-overlay {
    -webkit-overflow-scrolling: touch;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    header { padding: 0 0.75rem !important; }
    header nav button { padding: 0 0.65rem !important; font-size: 0.75rem !important; }
    #breadcrumb { padding: 0.45rem 0.75rem !important; font-size: 0.72rem !important; }
    #main-content { padding: 0.85rem 0.75rem !important; }
    .card { border-radius: 8px; }
    .btn { font-size: 0.78rem; padding: 0.42rem 0.7rem; }
    .btn-sm { font-size: 0.72rem; padding: 0.3rem 0.5rem; }
    .modal { border-radius: 12px 12px 0 0; max-height: 92vh; }
    .modal-overlay { align-items: flex-end; padding: 0; }
    .modal-lg { max-width: 100%; }
    .modal-body { padding: 1rem; }
    .modal-header { padding: 1rem; }
    .modal-footer { padding: 0.75rem 1rem; }
    /* grids de 2 colunas viram 1 no mobile */
    [style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns:repeat(3"] { grid-template-columns: 1fr 1fr !important; }
    /* topbar user name some no mobile */
    #user-name { display: none; }
    /* stat cards menores */
    .stat-card { padding: 0.65rem !important; }
  }
  /* Print */
  @media print {
    body { background: white; color: black; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
  }
  .print-only { display: none; }

  /* Spinner */
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--yellow);
    border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Separator */
  hr.sep { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* Checkbox */
  .chk { width: 16px; height: 16px; accent-color: var(--yellow); cursor: pointer; }

  /* Answer btn (gabarito) */
  .ans-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border);
    background: transparent; color: var(--text-muted); font-weight: 700; font-size: 0.8rem;
    cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .ans-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  .ans-btn.selected { background: var(--yellow); border-color: var(--yellow); color: #000; }

  /* Collapsible */
  .collapsible-content { overflow: hidden; transition: max-height 0.3s ease; }

  /* ── FLUXO POR ALUNO ── */
  .aluno-row { display: flex; align-items: center; padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; gap: 0.75rem; }
  .aluno-row:last-child { border-bottom: none; }
  .aluno-row:hover { background: var(--surface2); }
  .aluno-row.selecionado { background: #fffde0; border-left: 3px solid var(--yellow); }
  .aluno-row .aluno-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0; }
  .aluno-row .aluno-nome { flex: 1; font-size: 0.85rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .aluno-row .aluno-nota { font-weight: 800; font-size: 0.9rem; color: var(--yellow); flex-shrink: 0; }

  /* Painel de lançamento inline */
  #painel-lancamento { flex: 1; min-width: 0; padding: 0 0 0 1.25rem; }

  /* Card de resumo de bolhas */
  .resumo-bolhas { display: flex; flex-wrap: wrap; gap: 4px; padding: 0.6rem 0.75rem; background: var(--surface2); border: 1px dashed var(--border); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; line-height: 1.6; }
  .resumo-bolha-item { display: inline-flex; align-items: center; gap: 2px; padding: 1px 5px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); }
  .resumo-bolha-item.correta { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
  .resumo-bolha-item.errada { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
  .resumo-bolha-item .num { color: var(--text-muted); font-size: 0.65rem; }
  .resumo-bolha-item .letra { font-weight: 700; }
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- App Root -->
<div id="app" style="display:none">
  <!-- Topbar -->
  <header class="no-print" style="position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:0;height:54px;">
    <div style="display:flex;align-items:center;gap:0.55rem;margin-right:2rem;flex-shrink:0;">
      <div style="width:30px;height:30px;background:var(--yellow);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:0.95rem;">S</div>
      <div>
        <div style="font-weight:800;font-size:0.9rem;color:var(--yellow);letter-spacing:0.04em;">SICEP</div>
        <div style="font-size:0.62rem;color:var(--text-muted);">Avaliações</div>
      </div>
    </div>
    <nav style="display:flex;align-items:stretch;height:100%;">
      <button id="nav-avaliacoes" onclick="showMainTab('avaliacoes')" style="height:100%;padding:0 1.1rem;font-size:0.83rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:0.35rem;position:relative;top:1px;transition:color 0.15s,border-color 0.15s;">
        📋 Avaliações
      </button>
      <button id="nav-turmas" onclick="showMainTab('turmas')" style="height:100%;padding:0 1.1rem;font-size:0.83rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:0.35rem;position:relative;top:1px;transition:color 0.15s,border-color 0.15s;">
        🏫 Turmas
      </button>
    </nav>
    <div style="margin-left:auto;position:relative;">
      <button onclick="toggleUserMenu()" style="display:flex;align-items:center;gap:0.5rem;background:transparent;border:none;cursor:pointer;padding:0.25rem 0.4rem;border-radius:6px;" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
        <div style="width:28px;height:28px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--yellow);" id="user-initial">P</div>
        <span id="user-name" style="font-size:0.78rem;font-weight:600;color:var(--text-muted);"></span>
        <span style="font-size:0.6rem;color:var(--text-muted);">▾</span>
      </button>
      <div id="user-menu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.1);min-width:160px;z-index:200;overflow:hidden;">
        <div style="padding:0.6rem 0.85rem;border-bottom:1px solid var(--border);font-size:0.75rem;color:var(--text-muted);" id="user-menu-name">—</div>
        <button onclick="toggleUserMenu();abrirConfiguracoes()" style="width:100%;text-align:left;padding:0.6rem 0.85rem;font-size:0.82rem;font-weight:600;background:transparent;border:none;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:0.5rem;" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">
          ⚙️ Configurações
        </button>
        <button onclick="logout()" style="width:100%;text-align:left;padding:0.6rem 0.85rem;font-size:0.82rem;font-weight:600;color:var(--red);background:transparent;border:none;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;gap:0.5rem;" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='transparent'">
          ⎋ Sair da conta
        </button>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div id="breadcrumb" class="no-print" style="padding:0.55rem 1.5rem;border-bottom:1px solid var(--border);font-size:0.77rem;color:var(--text-muted);display:flex;align-items:center;gap:0.35rem;background:var(--surface2);min-height:36px;"></div>

  <!-- Main -->
  <main style="overflow-y:auto;">
    <div id="main-content" style="padding:1.75rem 2rem;max-width:960px;margin:0 auto;"></div>
  </main>
</div>

<!-- Loading -->
<div id="loading-screen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="text-align:center;">
    <div class="spinner" style="margin:0 auto 1rem;width:36px;height:36px;border-width:3px;"></div>
    <div style="font-weight:600;color:var(--text-muted);">Carregando SICEP...</div>
  </div>
</div>


<script>
// ============================================================
// SUPABASE INIT
// ============================================================
const SUPABASE_URL = 'https://biocjxggjjfeqmpuysik.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpb2NqeGdnampmZXFtcHV5c2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODUwOTQsImV4cCI6MjA4OTc2MTA5NH0.3bL3dKqiWGoHROE6vSzf-7Orp0GLcLpn4mHtUSwC0dU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// STATE
// ============================================================
let profile = null;
let mainTab = 'avaliacoes';
let navStack = []; // [{label, action}]

// Cache
let allTurmas = [];
let allAvaliacoes = [];
let currentAvaliacao = null;
let currentTurmaCtx = null; // turma context when navigating from Turmas tab

// OMR / câmera
let _omrLiveRAF = null;
let _omrDetectadoCount = 0;
let _omrFlashOn = false;
let _omrActiveVideoId = 'ocr-video';
let _omrFacingMode = 'environment';

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icon = type==='success'?'✓': type==='error'?'✗':'ℹ';
  t.innerHTML = `<span style="font-weight:800;">${icon}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s'; setTimeout(()=>t.remove(),300); }, 3500);
}

// ============================================================
// AUTH
// ============================================================

function toggleUserMenu() {
  const m = document.getElementById('user-menu');
  m.style.display = m.style.display === 'none' ? '' : 'none';
}

document.addEventListener('click', function(e) {
  const menu = document.getElementById('user-menu');
  if (menu && !menu.parentElement.contains(e.target)) {
    menu.style.display = 'none';
  }
});

function logout() {
  sessionStorage.removeItem('sicep_user');
  window.location.href = 'login.html';
}

async function init() {
  try {
    const raw = sessionStorage.getItem('sicep_user');
    if (!raw) throw new Error('no_session');
    profile = JSON.parse(raw);
    if (!profile?.id) throw new Error('invalid_session');
    document.getElementById('user-name').textContent = profile.nome || 'Professor';
    const ini = document.getElementById('user-initial');
    if (ini) ini.textContent = (profile.nome || 'P')[0].toUpperCase();
    const mn = document.getElementById('user-menu-name');
    if (mn) mn.textContent = profile.nome || 'Professor';
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = '';
    await loadTurmas();
    showMainTab('avaliacoes');
  } catch(e) {
    window.location.href = 'login.html';
  }
}

// ============================================================
// DATA LOADERS
// ============================================================
async function loadTurmas() {
  try {
    const pid = profile.professor_id || profile.id;
    const { data: pt, error: e1 } = await sb.from('professor_turmas').select('turma_id, disciplina').eq('professor_id', pid);
    if (e1) throw e1;
    if (!pt?.length) { allTurmas = []; return; }
    const ids = pt.map(x=>x.turma_id);
    const { data: turmas, error: e2 } = await sb.from('turmas').select('*').in('id', ids);
    if (e2) throw e2;
    allTurmas = (turmas||[]).map(t => ({
      ...t,
      disciplina: pt.find(p=>p.turma_id===t.id)?.disciplina || ''
    }));
  } catch(e) {
    allTurmas = [];
  }
}

async function loadAvaliacoes() {
  try {
    const { data, error } = await sb.from('sicep_avaliacoes').select('*').eq('professor_id', profile.id).order('created_at', {ascending:false});
    if (error) throw error;
    allAvaliacoes = data || [];
    return allAvaliacoes;
  } catch(e) {
    toast('Erro ao carregar avaliações: ' + (e.message||e), 'error');
    return [];
  }
}

async function loadQuestoes(avaliacaoId) {
  const { data, error } = await sb.from('sicep_questoes').select('*, sicep_alternativas(*)').eq('avaliacao_id', avaliacaoId).order('numero');
  if (error) throw error;
  return data || [];
}

async function loadResultados(avaliacaoId, turmaId=null) {
  let q = sb.from('sicep_resultados').select('*, alunos(id,nome_completo,codigo_simade)').eq('avaliacao_id', avaliacaoId);
  if (turmaId) q = q.eq('turma_id', turmaId);
  const { data, error } = await q;
  if (error) throw error;
  return data || [];
}

async function loadAlunos(turmaId) {
  const { data, error } = await sb.from('alunos').select('*').eq('turma_id', turmaId).order('nome_completo');
  if (error) throw error;
  return data || [];
}

// ============================================================
// NAVIGATION / BREADCRUMB
// ============================================================
function setBreadcrumb(items) {
  // items: [{label, action?}]
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = items.map((it,i) => {
    const isLast = i === items.length - 1;
    if (isLast) return `<span style="color:var(--text);font-weight:600;">${it.label}</span>`;
    return `<span class="link-btn" onclick="${it.action}" style="cursor:pointer;color:var(--text-muted);transition:color 0.15s;" onmouseover="this.style.color='var(--yellow)'" onmouseout="this.style.color='var(--text-muted)'">${it.label}</span><span style="color:var(--border);">›</span>`;
  }).join('');
}

function showMainTab(tab) {
  mainTab = tab;
  currentTurmaCtx = null;
  const navAv = document.getElementById('nav-avaliacoes');
  const navTu = document.getElementById('nav-turmas');
  [navAv, navTu].forEach(b => {

function crAtualizarGabarito() {
  const nQ = parseInt(document.getElementById('cr-nq')?.value || '20');
  const nA = parseInt(document.getElementById('cr-nalts')?.value || '4');
  const letras = 'ABCDE'.slice(0, nA).split('');
  const grid = document.getElementById('cr-gabarito-grid');
  if (!grid) return;
  const atual = crColetarGabarito();
  grid.innerHTML = Array.from({length: nQ}, (_, i) => {
    const q = i + 1;
    const gabAtual = atual[q] || '';
    const isEven = i % 2 === 1;
    return `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.75rem;background:${isEven ? 'var(--surface2)' : 'var(--surface)'};border-bottom:1px solid var(--border);">
      <span class="mono" style="min-width:24px;font-size:0.78rem;color:var(--text-muted);text-align:right;flex-shrink:0;">${q}.</span>
      <div style="display:flex;gap:3px;">
        ${letras.map(l => `<button class="ans-btn ${gabAtual === l ? 'selected' : ''}" style="width:28px;height:28px;font-size:0.7rem;" onclick="crToggleGab(this,'${l}')">${l}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function crToggleGab(btn, letra) {
  const row = btn.parentElement;
  const jaSelecionado = btn.classList.contains('selected');
  row.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('selected'));
  if (!jaSelecionado) btn.classList.add('selected');
}

function crColetarGabarito() {
  const gabarito = {};
  document.querySelectorAll('#cr-gabarito-grid > div').forEach((row, i) => {
    const sel = row.querySelector('.ans-btn.selected');
    if (sel) gabarito[i + 1] = sel.textContent.trim();
  });
  return gabarito;
}

function crLimparGabarito() {
  document.querySelectorAll('#cr-gabarito-grid .ans-btn').forEach(b => b.classList.remove('selected'));
}

function crRandomGabarito() {
  const nA = parseInt(document.getElementById('cr-nalts')?.value || '4');
  const letras = 'ABCDE'.slice(0, nA).split('');
  document.querySelectorAll('#cr-gabarito-grid > div').forEach(row => {
    row.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('selected'));
    const rand = letras[Math.floor(Math.random() * letras.length)];
    const btn = [...row.querySelectorAll('.ans-btn')].find(b => b.textContent.trim() === rand);
    if (btn) btn.classList.add('selected');
  });
}

async function crSalvar() {
  const titulo = document.getElementById('cr-titulo')?.value.trim();
  if (!titulo) { toast('Informe o titulo', 'error'); return null; }
  const nQ = parseInt(document.getElementById('cr-nq')?.value || '20');
  const nA = parseInt(document.getElementById('cr-nalts')?.value || '4');
  const pontosQRaw = document.getElementById('cr-pontos-q')?.value.trim();
  const pontosQ = pontosQRaw !== '' && !isNaN(parseFloat(pontosQRaw)) ? parseFloat(pontosQRaw) : 1;
  const valorTotal = Math.round(nQ * pontosQ * 100) / 100;
  const disciplina = document.getElementById('cr-disciplina')?.value.trim() || '';
  const data = document.getElementById('cr-data')?.value || null;
  const turmasIds = [...document.querySelectorAll('input[name="cr_turma"]:checked')].map(c => c.value);
  const gabarito = crColetarGabarito();
  const lancarSided = document.getElementById('cr-sided')?.checked || false;
  const trimestre = parseInt(document.getElementById('cr-trimestre')?.value || '1');
  try {
    const { data: av, error: e1 } = await sb.from('sicep_avaliacoes').insert({
      titulo, disciplina, data_aplicacao: data,
      valor_total: valorTotal, modo: 'impresso', status: 'rascunho',
      turmas_ids: turmasIds, professor_id: profile.id, lancar_sided: lancarSided
    }).select().single();
    if (e1) throw e1;
    const questoesPayload = Array.from({length: nQ}, (_, i) => ({
      avaliacao_id: av.id, numero: i + 1, enunciado: '',
      valor: pontosQ, num_alternativas: nA, gabarito: gabarito[i + 1] || null
    }));
    const { error: e2 } = await sb.from('sicep_questoes').insert(questoesPayload);
    if (e2) throw e2;
    toast('Cartao criado!', 'success');
    // Lançar no SIDED+ se solicitado
    if (lancarSided && turmasIds.length) {
      const sidePayload = {
        nome: titulo,
        pontos: valorTotal,
        trimestre,
        tipo: 'normal',
        turma_id: turmasIds[0],
        professor_id: profile.professor_id || profile.id,
        disciplina: disciplina || null
      };
      const { data: sidedNova, error: sErr } = await sb.from('avaliacoes').insert(sidePayload).select('id').single();
      if (sErr) {
        toast('Cartao criado, mas erro no SIDED+: ' + sErr.message, 'error');
      } else {
        await sb.from('sicep_avaliacoes').update({ sided_avaliacao_id: sidedNova.id }).eq('id', av.id);
        toast('Lancado no SIDED+ com sucesso!', 'success');
      }
    }
    await loadAvaliacoes();
    if (mainTab === 'avaliacoes') renderAvaliacoesTab();
    else renderTurmasTab();
    return av;
  } catch(e) {
    toast('Erro: ' + e.message, 'error');
    return null;
  }
}

async function crSalvarESair() {
  const av = await crSalvar();
  if (av) closeModal('modal-cartao-rapido');
}

async function crSalvarEImprimir() {
  const nQ = parseInt(document.getElementById('cr-nq')?.value || '20');
  const pontosQRaw = document.getElementById('cr-pontos-q')?.value.trim();
  const pontosQ = pontosQRaw !== '' && !isNaN(parseFloat(pontosQRaw)) ? parseFloat(pontosQRaw) : 1;
  const valorTotal = Math.round(nQ * pontosQ * 100) / 100;
  const av = await crSalvar();
  if (!av) return;
  closeModal('modal-cartao-rapido');
  setTimeout(async () => {
    const { data: avFull } = await sb.from('sicep_avaliacoes').select('*').eq('id', av.id).single();
    currentAvaliacao = avFull || av;
    currentAvaliacao.valor_total = currentAvaliacao.valor_total || valorTotal;
    renderAvaliacaoView(currentAvaliacao, 'respostas', null);
    setTimeout(() => window.print(), 700);
  }, 300);
}

async function salvarAvaliacao() {
  const titulo = document.getElementById('av-titulo').value.trim();
  if (!titulo) { toast('Informe o título da avaliação', 'error'); return; }
  const turmaChecks = [...document.querySelectorAll('input[name="turma_check"]:checked')].map(c=>c.value);
  const lancarSided = document.getElementById('av-sided').checked;
  const trimestre = parseInt(document.getElementById('av-trimestre')?.value||'1');
  const disciplina = document.getElementById('av-disciplina').value.trim();
  const pontos = parseFloat(document.getElementById('av-valor').value)||10;
  const payload = {
    titulo,
    disciplina,
    valor_total: pontos,
    data_aplicacao: document.getElementById('av-data').value||null,
    modo: document.getElementById('av-modo').value,
    descricao: document.getElementById('av-descricao').value.trim()||null,
    lancar_sided: lancarSided,
    turmas_ids: turmaChecks,
    professor_id: profile.id
  };
  try {
    let avaliacaoId = editingAvalId;
    // Busca sided_avaliacao_id existente se estiver editando
    let sidedAvaliacaoId = null;
    if (editingAvalId) {
      const { data: avalAtual } = await sb.from('sicep_avaliacoes').select('sided_avaliacao_id').eq('id', editingAvalId).single();
      sidedAvaliacaoId = avalAtual?.sided_avaliacao_id || null;
      const { error } = await sb.from('sicep_avaliacoes').update(payload).eq('id', editingAvalId);
      if (error) throw error;
      toast('Avaliação atualizada!', 'success');
    } else {
      const { data: nova, error } = await sb.from('sicep_avaliacoes').insert(payload).select().single();
      if (error) throw error;
      avaliacaoId = nova.id;
      toast('Avaliação criada!', 'success');
    }

    if (lancarSided && turmaChecks.length) {
      if (sidedAvaliacaoId) {
        // Editar: atualiza o registro existente no SIDED (usa primeira turma como referência)
        const { error: sErr } = await sb.from('avaliacoes').update({
          nome: titulo,
          pontos,
          trimestre,
          disciplina: disciplina || null
        }).eq('id', sidedAvaliacaoId);
        if (sErr) toast('Avaliação salva, mas erro ao atualizar no SIDED+: ' + sErr.message, 'error');
        else toast('SIDED+ atualizado!', 'success');
      } else {
        // Criar: insere no SIDED e salva o id retornado
        const sidePayload = {
          nome: titulo,
          pontos,
          trimestre,
          tipo: 'normal',
          turma_id: turmaChecks[0],
          professor_id: profile.professor_id || profile.id,
          disciplina: disciplina || null
        };
        const { data: sidedNova, error: sErr } = await sb.from('avaliacoes').insert(sidePayload).select('id').single();
        if (sErr) {
          toast('Avaliação salva, mas erro no SIDED+: ' + sErr.message, 'error');
        } else {
          // Salva o id do SIDED na sicep_avaliacoes para uso futuro no lançamento de notas
          await sb.from('sicep_avaliacoes').update({ sided_avaliacao_id: sidedNova.id }).eq('id', avaliacaoId);
          toast('Lançado no SIDED+ com sucesso!', 'success');
        }
      }
    }
    closeModal('modal-nova-aval');
    if (mainTab==='avaliacoes') renderAvaliacoesTab();
    else renderTurmasTab();
  } catch(e) {
    toast('Erro ao salvar: ' + (e.message||e), 'error');
  }
}

async function excluirAvaliacao(id) {
  if (!confirm('Excluir esta avaliação e todos os seus dados?')) return;
  const { error } = await sb.from('sicep_avaliacoes').delete().eq('id', id);
  if (error) { toast('Erro ao excluir: '+error.message, 'error'); return; }
  toast('Avaliação excluída', 'success');
  if (mainTab==='avaliacoes') renderAvaliacoesTab();
  else renderTurmasTab();
}

async function duplicarAvaliacao(id) {
  try {
    const { data: av } = await sb.from('sicep_avaliacoes').select('*').eq('id',id).single();
    const { data: newAv, error } = await sb.from('sicep_avaliacoes').insert({...av, id:undefined, titulo: av.titulo+' (cópia)', status:'rascunho', created_at:undefined}).select().single();
    if (error) throw error;
    // Copiar questões
    const questoes = await loadQuestoes(id);
    for (const q of questoes) {
      const alts = q.sicep_alternativas || [];
      const { data: newQ, error: eq } = await sb.from('sicep_questoes').insert({...q, id:undefined, avaliacao_id:newAv.id, created_at:undefined, sicep_alternativas:undefined}).select().single();
      if (eq) throw eq;
      for (const alt of alts) {
        await sb.from('sicep_alternativas').insert({...alt, id:undefined, questao_id:newQ.id, created_at:undefined});
      }
    }
    toast('Avaliação duplicada!', 'success');
    if (mainTab==='avaliacoes') renderAvaliacoesTab();
    else renderTurmasTab();
  } catch(e) {
    toast('Erro ao duplicar: '+e.message, 'error');
  }
}

async function changeAvalStatus(id, status) {
  const { error } = await sb.from('sicep_avaliacoes').update({status}).eq('id',id);
  if (error) { toast('Erro ao atualizar status', 'error'); return; }
  currentAvaliacao.status = status;
  toast('Status atualizado', 'success');
}

function switchAvalTab(tab, turmaCtxId) {
  document.querySelectorAll('.tab-btn').forEach(b=>{
    if (['❓ Questões','📋 Gabarito','📊 Resultados'].some(l=>b.textContent.includes(l.split(' ')[1]))) {
      b.classList.toggle('active', b.textContent.includes(tab==='questoes'?'Questões':tab==='respostas'?'Gabarito':'Resultados'));

  });
  if (tab==='questoes') renderQuestoesTab();
  else if (tab==='respostas') renderRespostasTab();
  else renderResultadosTab(turmaCtxId || (currentTurmaCtx?.id));
}

// Estado do painel inline
let _alunoSelecionadoId = null;
let _painelQuestoes = [];
let _painelRespostas = {};

        <span style="font-size:0.82rem;color:var(--text-muted);">Turma:</span>

        <option value="defasagem">Defasagem (&lt;40%)</option>

        <option value="adequado">Adequado (&gt;60%)</option>
      </select>
      <input class="input btn-sm" style="flex:1;min-width:130px;" id="busca-aluno-res" placeholder="🔍 Buscar aluno..." oninput="aplicarFiltrosResultados()"/>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem;">
      <div id="stats-res-mini" style="font-size:0.78rem;color:var(--text-muted);"></div>

          📤 Enviar pro SIDED+
        </button>` : ''}
    </div>

    ${mobile ? `

async function mudarTurmaResultados(turmaId) {
  _painelTurmaId = turmaId;
  _alunoSelecionadoId = null;
  fecharPainelMobile();
  if (!_isMobile()) {
    const pw = document.getElementById('painel-lancamento-wrap');
    if (pw) pw.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:2rem;"><div style="font-size:2.5rem;margin-bottom:0.5rem;">👆</div><div style="font-weight:600;font-size:0.9rem;">Selecione um aluno</div></div>`;
  }
  await carregarAlunosDasTurmas(turmaId);
}

function fecharPainelMobile() {
  const overlay = document.getElementById('painel-mobile-overlay');
  if (overlay) { overlay.style.display = 'none'; overlay.innerHTML = ''; }
  document.body.style.overflow = '';
}

async function carregarAlunosDasTurmas(turmaId) {
  const listaEl = document.getElementById('lista-alunos-res');
  if (!listaEl) return;
  listaEl.innerHTML = `<div class="spinner" style="margin:2rem auto;"></div>`;
  try {
    let alunos = [];
    if (turmaId) {
      alunos = await loadAlunos(turmaId);
    } else {
      // Todas as turmas
      const turmaIds = allTurmas.filter(t=>(currentAvaliacao.turmas_ids||[]).includes(t.id)).map(t=>t.id);
      for (const tid of turmaIds) {
        const a = await loadAlunos(tid);
        alunos.push(...a);
      }
      alunos.sort((a,b)=>a.nome_completo.localeCompare(b.nome_completo));
    }
    const resultados = await loadResultados(currentAvaliacao.id, turmaId);
    _currentResResultados = resultados;
    window._resAlunosCache = alunos;
    renderListaAlunosRes(alunos, resultados);
    atualizarStatsMini(alunos, resultados);
  } catch(e) {
    listaEl.innerHTML = `<div style="color:var(--red);padding:1rem;font-size:0.8rem;">Erro: ${e.message}</div>`;
  }
}

function renderListaAlunosRes(alunos, resultados) {
  const listaEl = document.getElementById('lista-alunos-res');
  if (!listaEl) return;

  const filtro = document.getElementById('filtro-desempenho')?.value || '';
  const busca = (document.getElementById('busca-aluno-res')?.value || '').toLowerCase();
  const vTotal = currentAvaliacao.valor_total || 10;
  const pct = nota => vTotal > 0 ? (nota/vTotal)*100 : 0;

  let filtrados = alunos.filter(a => {
    if (busca && !a.nome_completo.toLowerCase().includes(busca)) return false;
    const res = resultados.find(r=>r.aluno_id===a.id);
    if (filtro === 'pendente') return !res;
    if (filtro === 'ausente') return res?.ausente;
    if (filtro === 'defasagem') return res && !res.ausente && pct(res.nota)<40;
    if (filtro === 'intermediario') return res && !res.ausente && pct(res.nota)>=40 && pct(res.nota)<=60;
    if (filtro === 'adequado') return res && !res.ausente && pct(res.nota)>60;
    return true;
  });

  if (!filtrados.length) {
    listaEl.innerHTML = `<div style="padding:1rem;text-align:center;color:var(--text-muted);font-size:0.8rem;">Nenhum aluno encontrado</div>`;
    return;
  }

  const mobile = _isMobile();
  listaEl.innerHTML = filtrados.map((a, idx) => {
    const res = resultados.find(r=>r.aluno_id===a.id);
    const isSel = a.id === _alunoSelecionadoId;
    let notaHTML = '';
    if (!res) notaHTML = `<span style="font-size:0.72rem;font-weight:700;color:var(--border);">—</span>`;
    else if (res.ausente) notaHTML = `<span class="badge badge-gray" style="font-size:0.68rem;">AUS</span>`;
    else {
      const pct = currentAvaliacao.valor_total > 0 ? (res.nota/currentAvaliacao.valor_total)*100 : 0;
      const cor = pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--orange)' : 'var(--red)';
      notaHTML = `<span style="font-size:${mobile?'1rem':'0.88rem'};font-weight:800;color:${cor};">${res.nota}</span>`;
    }
    return `<div class="aluno-row ${isSel?'selecionado':''}" onclick="abrirPainelAluno('${a.id}',${idx})"
      style="${isSel?'border-left:3px solid var(--yellow);':''}${mobile?'padding:0.85rem 1rem;':''}touch-action:manipulation;"
      id="aluno-row-${a.id}">
      <div class="aluno-avatar" style="${mobile?'width:34px;height:34px;font-size:0.8rem;':''}">${a.nome_completo[0]}</div>
      <div style="flex:1;min-width:0;">
        <div class="aluno-nome" style="${mobile?'font-size:0.9rem;':''}">${esc(a.nome_completo)}</div>
        ${mobile && !res ? `<div style="font-size:0.7rem;color:var(--text-muted);">Pendente</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:0.4rem;">
        ${notaHTML}
        ${mobile ? `<span style="color:var(--text-muted);font-size:0.8rem;">›</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function atualizarStatsMini(alunos, resultados) {
  const el = document.getElementById('stats-res-mini');
  if (!el) return;
  const total = alunos.length;
  const registrados = resultados.length;
  const ausentes = resultados.filter(r=>r.ausente).length;
  const notas = resultados.filter(r=>!r.ausente && r.nota!=null).map(r=>r.nota);
  const media = notas.length ? (notas.reduce((a,b)=>a+b,0)/notas.length).toFixed(1) : '—';
  el.innerHTML = `${registrados}/${total} lançados · ${ausentes} ausente(s) · Média: <strong>${media}</strong>`;
}

async function abrirPainelAluno(alunoId, idx) {
  _alunoSelecionadoId = alunoId;
  document.querySelectorAll('.aluno-row').forEach(r=>{ r.classList.remove('selecionado'); r.style.borderLeft=''; });
  const rowEl = document.getElementById(`aluno-row-${alunoId}`);
  if (rowEl) { rowEl.classList.add('selecionado'); rowEl.style.borderLeft='3px solid var(--yellow)'; }

  const alunos = window._resAlunosCache || [];
  const aluno = alunos.find(a=>a.id===alunoId);
  const resExistente = _currentResResultados.find(r=>r.aluno_id===alunoId);
  const questoes = _painelQuestoes;

  window._painelEstado = {
    respostas: {...(resExistente?.respostas || {})},
    ausente: resExistente?.ausente || false,
    nota: resExistente?.nota ?? 0,
    alunoIdx: idx,
    turmaId: _painelTurmaId,
    resultadoId: resExistente?.id || null
  };

  if (_isMobile()) {
    // Abre como overlay fullscreen no mobile
    const overlay = document.getElementById('painel-mobile-overlay');
    if (overlay) {
      overlay.style.display = 'block';
      document.body.style.overflow = 'hidden';
      renderPainelLancamentoMobile(aluno, resExistente, questoes, overlay);
    }
  } else {
    renderPainelLancamento(aluno, resExistente, questoes);
  }
}

function _painelInnerHTML(aluno, questoes, estado, idxAtual, totalAlunos, temProximo, isMobile) {
  return `
  <div style="display:flex;flex-direction:column;${isMobile ? 'min-height:100vh;' : 'width:100%;height:100%;overflow-y:auto;max-height:65vh;'}">
    <!-- Header -->
    <div style="padding:${isMobile?'0.85rem 1rem':'1rem 1.25rem'};border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:0.75rem;position:sticky;top:0;z-index:5;">

function renderPainelLancamento(aluno, resExistente, questoes) {
  const pw = document.getElementById('painel-lancamento-wrap');
  if (!pw) return;
  const estado = window._painelEstado;
  const alunos = window._resAlunosCache || [];
  const idxAtual = alunos.findIndex(a=>a.id===aluno.id);
  const temProximo = idxAtual < alunos.length - 1;
  pw.style.display = 'flex';
  pw.style.alignItems = 'stretch';
  pw.innerHTML = _painelInnerHTML(aluno, questoes, estado, idxAtual, alunos.length, temProximo, false);
}

function renderPainelLancamentoMobile(aluno, resExistente, questoes, overlay) {
  const estado = window._painelEstado;
  const alunos = window._resAlunosCache || [];
  const idxAtual = alunos.findIndex(a=>a.id===aluno.id);
  const temProximo = idxAtual < alunos.length - 1;
  overlay.innerHTML = _painelInnerHTML(aluno, questoes, estado, idxAtual, alunos.length, temProximo, true);
  overlay.scrollTop = 0;
}

function painelSelecionaResposta(questaoId, letra, valor, gabarito) {
  const estado = window._painelEstado;
  if (!estado) return;
  // Toggle: clicar na mesma letra desmarca
  if (estado.respostas[questaoId] === letra) {
    delete estado.respostas[questaoId];
    // desmarca botão
    document.querySelectorAll(`button[onclick*="painelSelecionaResposta('${questaoId}'"]`).forEach(b=>b.classList.remove('selected'));
  } else {
    estado.respostas[questaoId] = letra;
    // Atualiza botões
    document.querySelectorAll(`button[onclick*="'${questaoId}'"]`).forEach(b=>{
      if (b.textContent === letra) b.classList.add('selected');
      else if ('ABCDE'.includes(b.textContent)) b.classList.remove('selected');
    });
  }
  painelRecalcNota();
  painelAtualizaResumo();
}

function painelLimpaResposta(questaoId) {
  const estado = window._painelEstado;
  if (!estado) return;
  delete estado.respostas[questaoId];
  document.querySelectorAll(`button[onclick*="'${questaoId}'"]`).forEach(b=>{
    if ('ABCDE'.includes(b.textContent)) b.classList.remove('selected');
  });
  painelRecalcNota();
  painelAtualizaResumo();
}

function painelRecalcNota() {
  const estado = window._painelEstado;
  if (!estado || !_painelQuestoes.length) return;
  let total = 0;
  _painelQuestoes.forEach(q => {
    if (q.gabarito && estado.respostas[q.id] === q.gabarito) total += (q.valor||1);
  });
  estado.nota = total;
  const el = document.getElementById('painel-nota');
  if (el) el.value = total;
}

function painelAtualizaResumo() {
  const estado = window._painelEstado;
  _painelQuestoes.forEach(q => {
    const el = document.getElementById(`rb-${q.id}`);
    if (!el) return;
    const resp = estado.respostas[q.id];
    const acerto = q.gabarito && resp && resp === q.gabarito;
    const errada = q.gabarito && resp && resp !== q.gabarito;
    el.className = `resumo-bolha-item ${acerto?'correta':errada?'errada':''}`;
    el.innerHTML = `<span class="num">${q.numero}:</span><span class="letra">${resp||'—'}</span>`;
  });
}

function painelSincNota() {
  const el = document.getElementById('painel-nota');
  if (el && window._painelEstado) window._painelEstado.nota = parseFloat(el.value)||0;
}

function painelToggleAusente() {
  const estado = window._painelEstado;
  if (!estado) return;
  estado.ausente = document.getElementById('painel-ausente')?.checked || false;
  const wrap = document.getElementById('painel-questoes-wrap');
  if (wrap) { wrap.style.opacity = estado.ausente?'0.3':'1'; wrap.style.pointerEvents = estado.ausente?'none':''; }
}

async function painelSalvar(irProximo) {
  const estado = window._painelEstado;
  if (!estado) return;
  const nota = document.getElementById('painel-nota');
  estado.nota = parseFloat(nota?.value||0)||0;
  const ausente = estado.ausente;
  const payload = {
    avaliacao_id: currentAvaliacao.id,
    aluno_id: _alunoSelecionadoId,
    turma_id: estado.turmaId,
    nota: ausente ? null : estado.nota,
    respostas: estado.respostas,
    ausente,
    registrado_por: profile.id,
    updated_at: new Date().toISOString()
  };
  try {
    if (estado.resultadoId) {
      const { error } = await sb.from('sicep_resultados').update(payload).eq('id', estado.resultadoId);
      if (error) throw error;
    } else {
      const { data: novo, error } = await sb.from('sicep_resultados').insert(payload).select().single();
      if (error) throw error;
      estado.resultadoId = novo.id;
    }
    toast('Salvo!', 'success');

    // Lança nota no SIDED+ se a avaliação tiver integração ativa
    if (currentAvaliacao.lancar_sided && currentAvaliacao.sided_avaliacao_id) {
      const sidedNota = {
        avaliacao_id: currentAvaliacao.sided_avaliacao_id,
        aluno_id: _alunoSelecionadoId,
        nota: ausente ? null : estado.nota,
        nao_realizado: ausente,
        lancado_em: new Date().toISOString()
      };
      const { error: sNotaErr } = await sb.from('notas')
        .upsert(sidedNota, { onConflict: 'avaliacao_id,aluno_id' });
      if (sNotaErr) toast('Nota salva no SICEP, mas erro no SIDED+: ' + sNotaErr.message, 'error');
    }
    // Atualiza cache local
    _currentResResultados = _currentResResultados.filter(r=>r.aluno_id!==_alunoSelecionadoId);
    _currentResResultados.push({...payload, id: estado.resultadoId, alunos: {nome_completo:'', codigo_simade:''}});
    // Atualiza item na lista
    const alunos = window._resAlunosCache || [];
    renderListaAlunosRes(alunos, _currentResResultados);
    atualizarStatsMini(alunos, _currentResResultados);
    // Re-seleciona
    const rowEl = document.getElementById(`aluno-row-${_alunoSelecionadoId}`);
    if (rowEl) { rowEl.classList.add('selecionado'); rowEl.style.borderLeft='3px solid var(--yellow)'; }

    if (irProximo) {
      const idxAtual = alunos.findIndex(a=>a.id===_alunoSelecionadoId);
      if (idxAtual < alunos.length - 1) {
        abrirPainelAluno(alunos[idxAtual+1].id, idxAtual+1);
        // Scroll o próximo aluno para view
        setTimeout(()=>{
          const next = document.getElementById(`aluno-row-${alunos[idxAtual+1].id}`);
          if (next) next.scrollIntoView({behavior:'smooth', block:'nearest'});
        }, 100);
      } else {
        toast('Último aluno da lista!', 'info');
      }
    }
  } catch(e) {
    toast('Erro ao salvar: '+e.message, 'error');
  }
}

// ── INICIA CÂMERA OCR ──
async function startOCRCamera(videoId, overlayId, isFs) {
  const video = document.getElementById(videoId);
  if (!video) return;

  // Para stream anterior se houver
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }

  try {
    const constraints = {
      video: {
        facingMode: _omrFacingMode,
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    video._stream = stream;

    await new Promise((resolve, reject) => {
      video.onloadedmetadata = resolve;
      video.onerror = reject;
      setTimeout(reject, 8000); // timeout segurança
    });

    await video.play();
    iniciarLiveDetection(videoId, overlayId, isFs);
  } catch(e) {
    const statusEl = document.getElementById('ocr-status-text');
    if (statusEl) {
      statusEl.textContent = '❌ Câmera negada ou indisponível';
      statusEl.style.background = 'rgba(220,38,38,0.8)';
    }
    toast('Erro ao acessar câmera: ' + (e.message || e), 'error');
  }
}

async function painelCaptureOCR() {
  const video = document.getElementById('ocr-video');
  const canvas = document.getElementById('ocr-canvas');
  const resultEl = document.getElementById('painel-ocr-result');
  if (!video || !canvas) return;

  const geminiKey = localStorage.getItem('gemini_api_key') || 'AIzaSyAlglp827qVhXIzmQC4GWn3rrivq7fcS84';

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const questoes = _painelQuestoes;
  if (!questoes.length) { if(resultEl) resultEl.textContent = 'Nenhuma questão.'; return; }

  if(resultEl) { resultEl.textContent = '⏳ Analisando bolhas...'; resultEl.style.color='var(--text-muted)'; }
  document.getElementById('btn-ler-omr')?.setAttribute('disabled','');

  try {
    const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

    // Prompt focado em bolhas, sem mencionar nomes de alunos
    const listaQuestoes = questoes.map(q => {
      const letras = 'ABCDE'.slice(0, q.num_alternativas || 4);
      return `Q${q.numero}: opções [${letras.split('').join(',')}]`;
    }).join(' | ');

    const prompt = `Analise esta imagem de um CARTÃO DE RESPOSTAS de avaliação escolar.
Ignore completamente qualquer nome, cabeçalho, texto ou identificação do aluno.
Foque APENAS na grade de bolhas/círculos marcados.
Para cada questão, identifique qual círculo/bolha está preenchido/marcado.
Um círculo marcado fica visivelmente mais escuro ou preenchido que os demais.

Questões e alternativas possíveis:
${listaQuestoes}

Retorne SOMENTE um JSON, sem explicação, sem markdown:
{"1":"A","2":"B",...}
Use null se a questão não tiver bolha marcada ou se a imagem estiver ilegível.`;

    const modelos = ['gemini-flash-latest', 'gemini-1.5-flash', 'gemini-1.5-flash-latest'];
    let respData = null;
    for (const modelo of modelos) {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${geminiKey}`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          contents:[{parts:[{text:prompt},{inline_data:{mime_type:'image/jpeg',data:base64}}]}],
          generationConfig:{temperature:0,maxOutputTokens:512}
        })
      });
      if (r.ok) { respData = await r.json(); break; }
    }
    if (!respData) throw new Error('Gemini indisponível');
    const texto = respData.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const match = texto.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Resposta inesperada da IA');
    const respostas = JSON.parse(match[0]);

    let detectadas = 0;
    questoes.forEach(q => {
      const letra = respostas[String(q.numero)];
      if (!letra || letra==='null') return;
      const letrasQ = 'ABCDE'.slice(0, q.num_alternativas||4).split('');
      if (!letrasQ.includes(letra.toUpperCase())) return;
      detectadas++;
      window._painelEstado.respostas[q.id] = letra.toUpperCase();
    });

    // Atualiza botões na UI
    questoes.forEach(q => {
      const resp = window._painelEstado.respostas[q.id];
      document.querySelectorAll(`button[onclick*="'${q.id}'"]`).forEach(b=>{
        if ('ABCDE'.includes(b.textContent)) {
          b.classList.toggle('selected', b.textContent === resp);
        }
      });
    });
    painelRecalcNota();
    painelAtualizaResumo();

    if(resultEl) {
      resultEl.textContent = detectadas > 0 ? `✅ ${detectadas} bolha(s) detectada(s)` : '⚠️ Nenhuma bolha identificada';
      resultEl.style.color = detectadas > 0 ? 'var(--green)' : 'var(--red)';
    }
  } catch(e) {
    if(resultEl) { resultEl.textContent = '❌ '+e.message; resultEl.style.color='var(--red)'; }
  } finally {
    document.getElementById('btn-ler-omr')?.removeAttribute('disabled');
  }
}

async function enviarNotasSided(sidedAvalId) {
  const checks = [...document.querySelectorAll('.sided-aluno-chk:checked')];
  if (!checks.length) { toast('Nenhum aluno selecionado.', 'info'); return; }

  const btn = document.getElementById('btn-confirmar-sided');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

  const payloads = checks.map(c => ({
    avaliacao_id: sidedAvalId,
    aluno_id: c.value,
    nota: parseFloat(c.dataset.nota),
    nao_realizado: false,
    lancado_em: new Date().toISOString()
  }));

  const { error } = await sb.from('notas')
    .upsert(payloads, { onConflict: 'avaliacao_id,aluno_id' });

  if (error) {
    toast('Erro ao enviar: ' + error.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Enviar selecionados'; }
    return;
  }

  toast(payloads.length + ' nota(s) enviada(s) ao SIDED+!', 'success');
  closeModal('modal-enviar-sided');
}

let _currentResResultados = [];
let _currentResTurmaId = null;

function renderResultadosList(resultados, valorTotal, filtro, turmaId) {
  const rc = document.getElementById('resultados-content');
  const pct = (nota) => valorTotal > 0 ? (nota/valorTotal)*100 : 0;
  const tag = (nota, ausente) => {
    if (ausente) return {cls:'badge-gray', label:'Ausente'};
    const p = pct(nota);
    if (p < 40) return {cls:'badge-red', label:'Defasagem'};
    if (p <= 60) return {cls:'badge-yellow', label:'Intermediário'};
    return {cls:'badge-green', label:'Adequado'};
  };

  let filtered = resultados;
  if (filtro === 'ausente') filtered = resultados.filter(r=>r.ausente);
  else if (filtro === 'defasagem') filtered = resultados.filter(r=>!r.ausente && pct(r.nota)<40);
  else if (filtro === 'intermediario') filtered = resultados.filter(r=>!r.ausente && pct(r.nota)>=40 && pct(r.nota)<=60);
  else if (filtro === 'adequado') filtered = resultados.filter(r=>!r.ausente && pct(r.nota)>60);

  const notas = resultados.filter(r=>!r.ausente && r.nota!=null).map(r=>r.nota);
  const media = notas.length ? notas.reduce((a,b)=>a+b,0)/notas.length : null;
  const sorted = [...notas].sort((a,b)=>a-b);
  const mediana = sorted.length ? (sorted.length%2===0?(sorted[sorted.length/2-1]+sorted[sorted.length/2])/2:sorted[Math.floor(sorted.length/2)]) : null;

  let statsHTML = '';
  if (notas.length > 0) {
    statsHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.75rem;margin-bottom:1.25rem;">
      <div class="card" style="padding:0.75rem;text-align:center;">
        <div style="font-size:1.4rem;font-weight:800;color:var(--yellow);">${notas.length}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Registrados</div>
      </div>
      <div class="card" style="padding:0.75rem;text-align:center;">
        <div style="font-size:1.4rem;font-weight:800;color:var(--yellow);">${media!=null?media.toFixed(1):'—'}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Média</div>
      </div>
      <div class="card" style="padding:0.75rem;text-align:center;">
        <div style="font-size:1.4rem;font-weight:800;color:var(--yellow);">${mediana!=null?mediana.toFixed(1):'—'}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Mediana</div>
      </div>
      <div class="card" style="padding:0.75rem;text-align:center;">
        <div style="font-size:1.4rem;font-weight:800;color:var(--red);">${resultados.filter(r=>r.ausente).length}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Ausentes</div>
      </div>
    </div>
    ${renderHistogram(notas, valorTotal, media, mediana)}`;
  }

  if (!filtered.length && !resultados.length) {
    rc.innerHTML = statsHTML + `<div style="text-align:center;padding:2rem;color:var(--text-muted);">Nenhum resultado registrado.</div>`;
    return;
  }

  rc.innerHTML = statsHTML + `
  <div style="margin-top:1.25rem;">
    ${filtered.map(r=>{
      const t = tag(r.nota, r.ausente);
      const p = r.ausente ? 0 : Math.round(pct(r.nota));
      return `<div class="card" style="padding:0.9rem 1.1rem;margin-bottom:0.5rem;display:flex;align-items:center;gap:1rem;">
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:0.88rem;">${esc(r.alunos?.nome_completo||'—')}</div>
          ${r.alunos?.codigo_simade?`<div style="font-size:0.72rem;color:var(--text-muted);font-family:monospace;">${r.alunos.codigo_simade}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem;">
          ${r.ausente ? '' : `<div style="text-align:right;">
            <div style="font-size:1.1rem;font-weight:800;color:var(--yellow);">${r.nota}</div>
            <div style="font-size:0.72rem;color:var(--text-muted);">${p}%</div>
          </div>`}
          <span class="badge ${t.cls}">${t.label}</span>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="editarResultado('${r.id}')" title="Editar">✏️</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="excluirResultado('${r.id}')" title="Excluir">🗑</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderHistogram(notas, valorTotal, media, mediana) {
  if (notas.length < 2) return '';
  const bins = 10;
  const step = valorTotal / bins;
  const counts = Array(bins).fill(0);
  notas.forEach(n => {
    const b = Math.min(Math.floor(n/step), bins-1);
    counts[b]++;
  });
  const maxCount = Math.max(...counts, 1);
  return `<div class="card" style="padding:1rem;margin-bottom:1rem;">
    <div style="font-size:0.75rem;font-weight:700;color:var(--text-muted);margin-bottom:0.5rem;">DISTRIBUIÇÃO DE NOTAS</div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:70px;">
      ${counts.map((c,i)=>`<div style="flex:1;background:var(--yellow);border-radius:2px 2px 0 0;height:${Math.round((c/maxCount)*100)}%;min-height:${c>0?'4px':'0'};position:relative;" title="${(i*step).toFixed(1)}–${((i+1)*step).toFixed(1)}: ${c} aluno(s)"></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:0.6rem;color:var(--text-muted);margin-top:3px;">
      <span>0</span><span>${(valorTotal/2).toFixed(0)}</span><span>${valorTotal}</span>
    </div>
  </div>`;
}

        <textarea class="input" id="q-enunciado" style="min-height:100px;">${esc(q.enunciado||'')}</textarea>
      </div>

        <label class="lbl" style="margin-bottom:0.5rem;">Alternativas</label>
        <div id="alt-fields" style="display:grid;gap:0.5rem;">
          ${letras.split('').map(l=>{
            const alt = alts.find(a=>a.letra===l);
            return `<div style="display:flex;align-items:center;gap:0.5rem;">
              <span style="font-weight:700;width:20px;color:var(--text-muted);">${l}</span>

    </div>
  </div>`;
  document.body.appendChild(modal);
  // Store selected gabarito
  modal._gabarito = q.gabarito||null;
}

function selectGabarito(btn, letra) {
  document.querySelectorAll('.ans-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  btn.closest('.modal').querySelector('#gabarito-btns')._selectedLetra = letra;
}

function updateAltFields() {
  const n = parseInt(document.getElementById('q-nalts').value);
  const letras = 'ABCDE'.slice(0,n);
  document.getElementById('alt-fields').innerHTML = letras.split('').map(l=>`
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <span style="font-weight:700;width:20px;color:var(--text-muted);">${l}</span>
      <input class="input" id="alt-${l}" placeholder="Texto da alternativa ${l}"/>
    </div>`).join('');
  const gBtns = document.getElementById('gabarito-btns');
  gBtns.innerHTML = letras.split('').map(l=>`<button class="ans-btn" onclick="selectGabarito(this,'${l}')" data-letra="${l}">${l}</button>`).join('');
}

async function salvarQuestao() {
  const numero = parseInt(document.getElementById('q-numero').value);
  const enunciado = document.getElementById('q-enunciado').value.trim();
  if (!numero || !enunciado) { toast('Preencha número e enunciado', 'error'); return; }
  const numAlts = parseInt(document.getElementById('q-nalts').value);
  const letras = 'ABCDE'.slice(0,numAlts).split('');
  const gabBtn = document.querySelector('.ans-btn.selected');
  const gabarito = gabBtn?.dataset?.letra || document.getElementById('gabarito-btns')?._selectedLetra || null;
  const payload = {
    avaliacao_id: currentAvaliacao.id,
    numero,
    enunciado,
    valor: parseFloat(document.getElementById('q-valor').value)||1,
    num_alternativas: numAlts,
    habilidade_bncc: document.getElementById('q-bncc').value.trim()||null,
    gabarito
  };
  try {
    let questaoId = editingQuestaoId;
    if (editingQuestaoId) {
      const { error } = await sb.from('sicep_questoes').update(payload).eq('id', editingQuestaoId);
      if (error) throw error;
      await sb.from('sicep_alternativas').delete().eq('questao_id', editingQuestaoId);
    } else {
      const { data: newQ, error } = await sb.from('sicep_questoes').insert(payload).select().single();
      if (error) throw error;
      questaoId = newQ.id;
    }
    // Insert alternativas
    const altPayloads = letras.map(l=>({
      questao_id: questaoId,
      letra: l,
      texto: document.getElementById(`alt-${l}`)?.value?.trim()||''
    })).filter(a=>a.texto);
    if (altPayloads.length) {
      const { error } = await sb.from('sicep_alternativas').insert(altPayloads);
      if (error) throw error;
    }
    toast(editingQuestaoId?'Questão atualizada!':'Questão criada!', 'success');
    closeModal('modal-questao');
    renderQuestoesTab();
  } catch(e) { toast('Erro: '+e.message, 'error'); }
}

async function excluirQuestao(id) {
  if (!confirm('Excluir esta questão?')) return;
  await sb.from('sicep_questoes').delete().eq('id',id);
  toast('Questão excluída', 'success');
  renderQuestoesTab();
}

function switchCartaoModelo(modelo) {
  cartaoModelo = modelo;
  document.getElementById('btn-modelo-simples')?.classList.toggle('btn-primary', modelo==='simples');

  loadQuestoes(currentAvaliacao.id).then(questoes => {
    const w = document.getElementById('cartao-wrapper');
    if (w) w.innerHTML = renderCartao(questoes, modelo);
  });
}

function renderCartao(questoes, modelo) {
  if (modelo === 'caed') return renderCartaoCAEd(questoes);
  return renderCartaoSimples(questoes);
}

function iniciarLiveDetection(videoId, overlayId, isFs) {
  if (_omrLiveRAF) cancelAnimationFrame(_omrLiveRAF);
  const video = document.getElementById(videoId);
  const overlay = document.getElementById(overlayId);
  const capCanvas = document.getElementById('ocr-canvas');
  if (!video || !overlay) return;
  const FRAMES_PARA_ATIVAR = 8;

  function ajustarOverlay() {
    const rect = overlay.parentElement.getBoundingClientRect();
    if (rect.width > 0) { overlay.width = rect.width; overlay.height = rect.height; }
  }
  ajustarOverlay();

  function setStatus(pronto, count) {
    ['ocr-status-text','ocr-status-text-fs'].forEach(id => {
      const el = document.getElementById(id); if (!el) return;
      if (pronto) { el.textContent = '✅ Cartão detectado — clique em Ler Cartão'; el.style.background = 'rgba(22,163,74,0.8)'; }
      else if (count > 0) { el.textContent = '🔄 Aguardando estabilizar...'; el.style.background = 'rgba(0,0,0,0.55)'; }
      else { el.textContent = '🔍 Procurando cartão...'; el.style.background = 'rgba(0,0,0,0.55)'; }
    });
    ['btn-ler-omr','btn-ler-omr-fs'].forEach(id => {
      const btn = document.getElementById(id); if (!btn) return;
      btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
    });
  }

  function loop() {
    _omrLiveRAF = requestAnimationFrame(loop);
    if (!video.srcObject || video.readyState < 2) return;
    const vW = video.videoWidth, vH = video.videoHeight;
    if (!vW || !vH) return;

    capCanvas.width = vW; capCanvas.height = vH;
    const capCtx = capCanvas.getContext('2d');
    capCtx.drawImage(video, 0, 0, vW, vH);

    const corners = omrDetectarCantos(capCtx, vW, vH);
    const detectado = omrAvaliarQualidade(corners, vW, vH);

    if (!overlay.width) ajustarOverlay();
    const oW = overlay.width, oH = overlay.height;
    if (!oW || !oH) return;
    const scaleX = oW/vW, scaleY = oH/vH;

    const octx = overlay.getContext('2d');
    octx.clearRect(0, 0, oW, oH);

    if (detectado) _omrDetectadoCount = Math.min(_omrDetectadoCount+1, FRAMES_PARA_ATIVAR+5);
    else _omrDetectadoCount = Math.max(_omrDetectadoCount-2, 0);

    const confianca = Math.min(_omrDetectadoCount/FRAMES_PARA_ATIVAR, 1);
    const pronto = confianca >= 1;
    const rc = Math.round(255*(1-confianca)), gc = Math.round(200*confianca+228*(1-confianca));
    const cor = `rgb(${rc},${gc},0)`;

    // Quadrilátero
    const pts = [corners.tl, corners.tr, corners.br, corners.bl];
    octx.beginPath();
    octx.moveTo(pts[0].x*scaleX, pts[0].y*scaleY);
    for(let i=1;i<4;i++) octx.lineTo(pts[i].x*scaleX, pts[i].y*scaleY);
    octx.closePath();
    octx.strokeStyle=cor; octx.lineWidth=2.5; octx.stroke();
    octx.fillStyle=`rgba(${rc},${gc},0,0.07)`; octx.fill();

    // Quadradinhos nos cantos
    const SZ = isFs?18:12;
    pts.forEach(p => {
      octx.fillStyle=cor;
      octx.fillRect(p.x*scaleX-SZ/2, p.y*scaleY-SZ/2, SZ, SZ);
    });




    // Barra de progresso
    if (!pronto) {
      octx.fillStyle='rgba(0,0,0,0.4)'; octx.fillRect(oW*0.15,oH-11,oW*0.7,5);
      octx.fillStyle=cor; octx.fillRect(oW*0.15,oH-11,oW*0.7*confianca,5);
    }
    setStatus(pronto, _omrDetectadoCount);
  }
  loop();
}

function desenharBolhasOverlay(octx, corners, vW, vH, scaleX, scaleY, capCtx, isFs) {
  const modal = document.getElementById('modal-resultado');
  const questoes = modal?._questoes || [];
  if (!questoes.length) return;
  const nQ = questoes.length;
  const nA = Math.max(...questoes.map(q => q.num_alternativas||4));
  const dstW=800, dstH=1100;
  const margemTop=dstH*0.35, margemBot=dstH*0.92;
  const margemLeft=dstW*0.08, margemRight=dstW*0.92;
  const areaH=margemBot-margemTop, areaW=margemRight-margemLeft;
  const rowH=areaH/nQ, altW=areaW*0.72/nA;
  const bolhaR=Math.min(altW,rowH)*0.32;
  const cx0=margemLeft+areaW*0.30+altW*0.5;
  const {tl,tr,bl,br}=corners;

  function retToCamera(rx,ry) {
    const u=rx/dstW, v=ry/dstH;
    return {
      x:((1-v)*((1-u)*tl.x+u*tr.x)+v*((1-u)*bl.x+u*br.x))*scaleX,
      y:((1-v)*((1-u)*tl.y+u*tr.y)+v*((1-u)*bl.y+u*br.y))*scaleY
    };
  }

  const imgData=capCtx.getImageData(0,0,vW,vH); const d=imgData.data;
  function lumCam(x,y){ const ix=Math.round(x),iy=Math.round(y); if(ix<0||ix>=vW||iy<0||iy>=vH)return 255; const i=(iy*vW+ix)*4; return d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114; }

  const letras='ABCDE'.slice(0,nA);
  const rVis=Math.max(isFs?10:6, Math.round(bolhaR*Math.min(scaleX,scaleY)));

  for(let q=0;q<nQ;q++){
    const cy_r=margemTop+q*rowH+rowH*0.5;
    const scores=[], camPts=[];
    for(let a=0;a<nA;a++){
      const cam=retToCamera(cx0+a*altW, cy_r);
      camPts.push(cam);
      let sum=0,cnt=0; const sr=Math.max(3,Math.round(rVis*0.5));
      for(let dy=-sr;dy<=sr;dy++) for(let dx=-sr;dx<=sr;dx++)
        if(dx*dx+dy*dy<=sr*sr){sum+=lumCam(cam.x/scaleX+dx,cam.y/scaleY+dy);cnt++;}
      scores.push(cnt>0?sum/cnt:255);
    }
    const minL=Math.min(...scores),maxL=Math.max(...scores);
    const marcada=maxL-minL>18?scores.indexOf(minL):-1;

    for(let a=0;a<nA;a++){
      const {x,y}=camPts[a], mk=a===marcada;
      octx.beginPath(); octx.arc(x,y,rVis,0,Math.PI*2);
      if(mk){octx.fillStyle='rgba(22,163,74,0.55)';octx.fill();octx.strokeStyle='#16a34a';}
      else{octx.strokeStyle='rgba(255,228,0,0.75)';}
      octx.lineWidth=1.5; octx.stroke();
      octx.fillStyle=mk?'#fff':'rgba(255,228,0,0.95)';
      octx.font=`bold ${Math.max(8,Math.round(rVis*0.75))}px sans-serif`;
      octx.textAlign='center'; octx.textBaseline='middle';
      octx.fillText(letras[a],x,y);
    }
  }
}

function omrAvaliarQualidade(corners, W, H) {
  const m=Math.floor(Math.min(W,H)*0.04);
  const isFallback=(Math.abs(corners.tl.x-m)<5&&Math.abs(corners.tl.y-m)<5&&Math.abs(corners.br.x-(W-m))<5&&Math.abs(corners.br.y-(H-m))<5);
  if(isFallback) return false;
  const larg=Math.max(corners.tr.x,corners.br.x)-Math.min(corners.tl.x,corners.bl.x);
  const alt=Math.max(corners.bl.y,corners.br.y)-Math.min(corners.tl.y,corners.tr.y);
  return larg>W*0.2&&alt>H*0.2;
}

function stopOCR() {
  if (_omrLiveRAF) { cancelAnimationFrame(_omrLiveRAF); _omrLiveRAF = null; }
  if (_omrFlashOn) { _omrFlashOn=false; }
  const fs=document.getElementById('ocr-fullscreen');
  if(fs&&fs.style.display!=='none'){fs.style.display='none'; if(screen.orientation?.unlock)screen.orientation.unlock();}
  ['ocr-video','ocr-video-fs'].forEach(id=>{
    const v=document.getElementById(id);
    if(v?.srcObject){v.srcObject.getTracks().forEach(t=>t.stop()); v.srcObject=null; v._stream=null;}
  });
  const el=document.getElementById('ocr-area'); if(el) el.style.display='none';
  ['ocr-status-text','ocr-status-text-fs'].forEach(id=>{const e=document.getElementById(id);if(e){e.textContent='Aponte para o cartão';e.style.background='rgba(0,0,0,0.55)';}});
}

// ── CAPTURA OCR VIA GEMINI ──
async function captureOCR() {
  const video = document.getElementById(_omrActiveVideoId) || document.getElementById('ocr-video');
  const canvas = document.getElementById('ocr-canvas');
  const resultEl = document.getElementById('ocr-result');
  if (!video || !canvas) return;

  const geminiKey = localStorage.getItem('gemini_api_key') || 'AIzaSyAlglp827qVhXIzmQC4GWn3rrivq7fcS84';
  if (!geminiKey) {
    resultEl.innerHTML = '⚠️ Configure sua chave Gemini em <b>⚙️ Configurações</b> primeiro.';
    resultEl.style.color = 'var(--red)';
    return;
  }

  // Captura frame
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const modal = document.getElementById('modal-resultado');
  const questoes = modal?._questoes || [];
  if (!questoes.length) { resultEl.textContent = 'Nenhuma questão para processar.'; return; }

  resultEl.textContent = '';
  resultEl.style.color = 'var(--text-muted)';

  try {
    // Comprime a imagem para JPEG 80%
    const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

    const listaQuestoes = questoes.map(q => {
      const letras = 'ABCDE'.slice(0, q.num_alternativas || 4);
      return `Questão ${q.numero} (alternativas: ${letras.split('').join(', ')})`;
    }).join('\n');

    const prompt = `Esta é uma foto de um cartão de respostas de prova. Cada questão tem círculos/bolhas para marcar a alternativa.
Identifique qual alternativa está marcada (preenchida/pintada) em cada questão.
Responda SOMENTE com um JSON no formato: {"1":"A","2":"B","3":"C",...} onde a chave é o número da questão e o valor é a letra marcada.
Se não conseguir identificar uma questão, use null.

Questões esperadas:
${listaQuestoes}`;

    const modelos = ['gemini-flash-latest', 'gemini-1.5-flash', 'gemini-1.5-flash-latest'];
    let resp, erroFinal;
    for (const modelo of modelos) {
      resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${geminiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: 'image/jpeg', data: base64 } }] }],
          generationConfig: { temperature: 0, maxOutputTokens: 512 }
        })
      });
      if (resp.ok) break;
      const err = await resp.json();
      erroFinal = err.error?.message || `HTTP ${resp.status}`;
      resp = null;
    }
    if (!resp) throw new Error(erroFinal);

    const data = await resp.json();
    const texto = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

    // Extrai JSON da resposta
    const match = texto.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Gemini não retornou JSON válido: ' + texto);
    const respostas = JSON.parse(match[0]);

    // Aplica respostas nas questões
    let detectadas = 0;
    questoes.forEach(q => {
      const letra = respostas[String(q.numero)];
      if (!letra || letra === 'null') return;
      const letrasQ = 'ABCDE'.slice(0, q.num_alternativas || 4).split('');
      if (!letrasQ.includes(letra.toUpperCase())) return;
      detectadas++;
      modal._respostas = modal._respostas || {};
      modal._respostas[q.id] = letra.toUpperCase();
      const btn = [...document.querySelectorAll('#res-questoes .ans-btn')].find(b =>
        b.textContent === letra.toUpperCase() && b.onclick?.toString().includes(q.id)
      );
      if (btn) {
        btn.parentElement.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      }
    });

    calcNotaFromRespostas(modal);
    if (detectadas > 0) {
      resultEl.textContent = `✅ ${detectadas} resposta(s) detectada(s). Confira e ajuste se necessário.`;
      resultEl.style.color = 'var(--green)';
    } else {
      resultEl.textContent = 'Gemini não identificou respostas. Tente com melhor iluminação.';

  } catch(e) {
